<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- PAGE 1 -->
    <div id="page1" class="page active">
        <h1>🎉 Birthday Surprise 🎉</h1>
        <input id="nameInput" placeholder="Enter name">
        <button onclick="validateName()">Continue</button>
    </div>

    <!-- REJECT -->
    <div id="reject1" class="page">
        <p id="rejectMsg"></p>
        <button onclick="nextReject()">Next</button>
    </div>

    <div id="reject2" class="page">
        <h2>Are you sure?</h2>
        <button onclick="nextReject()">Next</button>
    </div>

    <div id="reject3" class="page">
        <h2>Access Denied</h2>
        <button onclick="closeSite()">Close</button>
    </div>

    <!-- MAILBOX -->
    <div id="mailboxPage" class="page">
        <div class="mailbox" onclick="openMailbox()">📬</div>
        <div id="letterArea"></div>
        <div id="petalArea"></div>
        <p id="welcomeMsg"></p>
        <button onclick="nextFromMailbox()">Continue</button>
    </div>

    <!-- QUOTE -->
    <div id="quotePage" class="page">
        <h2 class="quote">"You are special 💖"</h2>
        <button onclick="startQuiz()">Start</button>
    </div>

    <!-- DYNAMIC -->
    <div id="dynamic"></div>

</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio.mp3">
</audio>

<audio id="popSound"></audio>
<audio id="giftSound"></audio>

<script src="script.js"></script>
</body>
</html>
