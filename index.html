

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Shweta 🎂</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container" id="app">

    <!-- PAGE 1 -->
    <div id="page1" class="page active">

        <h1>✨ Birthday Surprise ✨</h1>

        <p style="color:white;">
            Enter your name to begin
        </p>

        <input
            type="text"
            id="nameInput"
            placeholder="Type your name..."
        >

        <button class="next-btn" onclick="validateName()">
            Continue →
        </button>

    </div>

    <!-- REJECT 1 -->
    <div id="reject1" class="page">

        <div class="mailbox">
            📬
        </div>

        <p
            id="rejectNameMsg"
            style="color:white;font-size:1.5rem;"
        ></p>

        <button class="next-btn" onclick="nextReject()">
            Next →
        </button>

    </div>

    <!-- REJECT 2 -->
    <div id="reject2" class="page">

        <h2>
            Are you Shweta?? Is it your Birthday Today??
        </h2>

        <button class="next-btn" onclick="nextReject()">
            Next →
        </button>

    </div>

    <!-- REJECT 3 -->
    <div id="reject3" class="page">

        <h2>I don't think so 😂</h2>

        <button class="next-btn" onclick="closeSite()">
            Close
        </button>

    </div>

    <!-- MAILBOX PAGE -->
    <div id="mailboxPage" class="page">

        <div
            class="mailbox"
            id="mailbox"
            onclick="openMailbox()"
        >
            📬
        </div>

        <div id="letterContainer"></div>

        <div id="petalContainer"></div>

        <p
            id="welcomeMsg"
            style="color:white;font-size:1.5rem;"
        ></p>

        <button
            class="next-btn hidden"
            id="nextAfterMailbox"
            onclick="nextPage()"
        >
            Next →
        </button>

    </div>

    <!-- QUOTE PAGE -->
    <div id="quotePage" class="page">

        <h2>✨ A Little Something ✨</h2>

        <p
            style="
                color:#FFD700;
                font-size:1.3rem;
                font-style:italic;
            "
        >
            "Like stars that shine brightest in the darkest night,
            you have your own ways to make things beautiful."
        </p>

        <button class="next-btn" onclick="nextPage()">
            Next →
        </button>

    </div>

    <!-- DYNAMIC CONTENT -->
    <div id="dynamicContent"></div>

</div>

<!-- MUSIC BUTTON -->
<div
    class="music-control"
    id="musicControl"
    onclick="toggleMusic()"
>
    🔊
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop preload="auto">
    <source
        src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8f7b6c6.mp3?filename=happy-birthday-8bit-108744.mp3"
        type="audio/mpeg"
    >
</audio>

<!-- POP SOUND -->
<audio id="popSound" preload="auto">
    <source
        src="https://www.soundjay.com/button/sounds/button-16.mp3"
        type="audio/mpeg"
    >
</audio>

<!-- GIFT SOUND -->
<audio id="giftSound" preload="auto">
    <source
        src="https://www.soundjay.com/button/sounds/button-09.mp3"
        type="audio/mpeg"
    >
</audio>

<script src="script.js"></script>

</body>
</html>
