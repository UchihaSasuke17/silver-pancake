<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars-container"></div>

<div class="container">

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h1>Birthday Surprise</h1>
<input id="nameInput" placeholder="Enter name">
<button onclick="validateName()">Continue</button>
</div>

<!-- REJECT -->
<div id="reject1" class="page">
<p id="rejectNameMsg"></p>
<button onclick="nextReject()">Next</button>
</div>

<div id="reject2" class="page">
<h2>Are you sure?</h2>
<button onclick="nextReject()">Next</button>
</div>

<div id="reject3" class="page">
<h2>Bye</h2>
<button onclick="closeSite()">Close</button>
</div>

<!-- MAILBOX -->
<div id="mailboxPage" class="page">
<div id="mailbox" onclick="openMailbox()">📬</div>
<p id="welcomeMsg"></p>
<button id="nextAfterMailbox" class="hidden" onclick="nextPage()">Next</button>
</div>

<!-- QUOTE -->
<div id="quotePage" class="page">
<div class="quote">"You shine like stars"</div>
<button onclick="nextPage()">Next</button>
</div>

<!-- DYNAMIC -->
<div id="dynamicContent"></div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8f7b6c6.mp3">
</audio>

<div onclick="toggleMusic()" class="music">🔊</div>

<script src="script.js"></script>
</body>
</html>
