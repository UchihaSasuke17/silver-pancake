<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Birthday Surprise for Shweta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 50%, #0f0f2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        .star.large { width: 3px; height: 3px; }
        .star.medium { width: 2px; height: 2px; }
        .star.small { width: 1px; height: 1px; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
            z-index: 10;
        }

        .page {
            display: none;
            padding: 35px 30px;
            animation: pageFadeIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .page.active { display: block; }

        @keyframes pageFadeIn {
            0% { opacity: 0; transform: translateY(25px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .page-header { text-align: center; margin-bottom: 25px; }
        .page-footer { margin-top: 30px; text-align: center; }

        .page-number {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #FFD700;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #FFD700, #ff69b4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.5rem;
            color: #FFD700;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .beautiful-quote {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #f0e6ff;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .quote-card {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
        }

        .fancy-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 60px;
            font-size: 1rem;
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        .fancy-input:focus {
            border-color: #FFD700;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        .fancy-input::placeholder { color: rgba(255,255,255,0.5); }

        .glow-btn {
            background: linear-gradient(95deg, #ff6b6b, #ff8e8e, #ff6b6b);
            background-size: 200% auto;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .glow-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,107,107,0.4);
            background-position: right center;
        }

        .mailbox-3d {
            font-size: 6rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3));
        }

        .mailbox-3d:hover { transform: scale(1.05); }

        .letter-container {
            position: relative;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .flying-letter {
            font-size: 2.5rem;
            animation: letterFly 1s ease-out forwards;
        }

        @keyframes letterFly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            30% { transform: translate(50px, -80px) scale(1.2); }
            100% { transform: translate(150px, -200px) scale(1.5); opacity: 0; }
        }

        .petal-container {
            position: relative;
            min-height: 100px;
        }

        .rose-petal {
            position: absolute;
            font-size: 1.3rem;
            animation: petalBurst 1.2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes petalBurst {
            0% { transform: scale(0) translate(0,0); opacity: 1; }
            100% { transform: scale(1.2) translate(var(--x), var(--y)); opacity: 0; }
        }

        .welcome-name {
            font-size: 1.8rem;
            text-align: center;
            color: #FFD700;
            margin: 20px 0;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .hidden { display: none; }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .dot.active {
            background: #FFD700;
            width: 20px;
            border-radius: 10px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
        }

        .option-card {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .option-card:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.02);
            border-color: #FFD700;
        }

        .timer-display {
            text-align: center;
            font-size: 1rem;
            color: #FFD700;
            margin: 15px 0;
        }

        .kitkat-timer {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 8px;
            margin: 15px 0;
        }

        .riddle-input {
            width: 90%;
            padding: 14px;
            font-size: 1rem;
            text-align: center;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 60px;
            margin: 20px auto;
            display: block;
            letter-spacing: 2px;
        }

        .gifts-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .balloon-gift {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .balloon-gift:hover { transform: translateY(-10px); }

        .balloon-icon { font-size: 2.5rem; }
        .gift-icon {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            border-radius: 15px;
            padding: 15px;
            margin-top: 5px;
        }

        .gift-message-area {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,215,0,0.1);
            border-radius: 20px;
            color: #FFD700;
            font-size: 1rem;
            text-align: center;
        }

        .puzzle-container { width: 100%; margin: 20px 0; }

        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
            background: #2a2a4a;
            border: 3px solid #FFD700;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }

        .puzzle-piece {
            background-size: 400% 400%;
            cursor: pointer;
            transition: transform 0.15s;
            background-repeat: no-repeat;
        }

        .puzzle-piece:hover { transform: scale(0.97); }

        .puzzle-piece.empty {
            background: #1a1a3a !important;
            position: relative;
        }

        .puzzle-piece.empty::after {
            content: "⬜";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            opacity: 0.5;
        }

        .puzzle-message {
            text-align: center;
            margin-top: 20px;
            color: #FFD700;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .cake-animation-area {
            position: relative;
            height: 280px;
            margin: 30px 0;
        }

        .falling-cake-layer {
            position: absolute;
            font-size: 3rem;
            left: 50%;
            transform: translateX(-50%);
            animation: cakeFall 1.4s ease-in forwards;
        }

        @keyframes cakeFall {
            0% { top: -80px; opacity: 0; transform: translateX(-50%) rotate(0deg); }
            100% { top: 200px; opacity: 1; transform: translateX(-50%) rotate(360deg); }
        }

        .final-birthday-message {
            text-align: center;
            font-size: 1.5rem;
            color: #FFD700;
            margin-top: 30px;
            font-weight: bold;
        }

        .no-context-card {
            text-align: center;
            font-size: 1.5rem;
            color: #FFD700;
            padding: 30px;
            animation: softPulse 1s infinite;
        }

        @keyframes softPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .music-control:hover { transform: scale(1.1); background: rgba(0,0,0,0.8); }
        .music-icon { font-size: 1.6rem; }

        @media (max-width: 550px) {
            .container { max-width: 95%; }
            .page { padding: 25px 20px; }
            .main-title { font-size: 1.8rem; }
            .question-text { font-size: 1.3rem; }
            .puzzle-grid { gap: 2px; }
        }
    </style>
</head>
<body>

<div class="stars-container" id="starsContainer"></div>
<div class="container" id="app">

    <!-- PAGE 1: NAME INPUT -->
    <div id="page1" class="page active">
        <div class="page-header"><span class="page-number">✨</span></div>
        <div class="page-content">
            <h1 class="main-title">Birthday Surprise</h1>
            <p class="subtitle">Enter your name</p>
            <div class="input-group">
                <input type="text" id="nameInput" class="fancy-input" placeholder="Type your name..." autocomplete="off">
                <button class="glow-btn" onclick="validateName()">Continue →</button>
            </div>
        </div>
        <div class="page-footer">
            <div class="progress-dots">
                <span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
        </div>
    </div>

    <!-- REJECTION PAGE 1 -->
    <div id="reject1" class="page">
        <div class="page-header"><span class="page-number">✨</span></div>
        <div class="page-content">
            <div class="mailbox-animation" id="rejectMailbox">📬</div>
            <p id="rejectNameMsg" class="welcome-name"></p>
            <button class="glow-btn" onclick="nextReject()">Next →</button>
        </div>
        <div class="page-footer"><div class="progress-dots"><span class="dot"></span><span class="dot active"></span><span class="dot"></span></div></div>
    </div>

    <!-- REJECTION PAGE 2 -->
    <div id="reject2" class="page">
        <div class="page-header"><span class="page-number">🤔</span></div>
        <div class="page-content">
            <h2 class="question-text">Did you change your name??</h2>
            <button class="glow-btn" onclick="nextReject()">Next →</button>
        </div>
        <div class="page-footer"><div class="progress-dots"><span class="dot"></span><span class="dot"></span><span class="dot active"></span></div></div>
    </div>

    <!-- REJECTION PAGE 3 -->
    <div id="reject3" class="page">
        <div class="page-header"><span class="page-number">💔</span></div>
        <div class="page-content">
            <h2 class="question-text">I don't think so</h2>
            <button class="glow-btn" onclick="closeSite()">Close</button>
        </div>
        <div class="page-footer"><div class="progress-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
    </div>

    <!-- PAGE 2: MAILBOX -->
    <div id="mailboxPage" class="page">
        <div class="page-header"><span class="page-number">🎁</span></div>
        <div class="page-content">
            <div class="mailbox-3d" id="mailbox" onclick="openMailbox()"><div class="mailbox-front">📬</div></div>
            <div id="letterContainer" class="letter-container"></div>
            <div id="petalContainer" class="petal-container"></div>
            <p id="welcomeMsg" class="welcome-name hidden"></p>
            <button class="glow-btn hidden" id="nextAfterMailbox" onclick="nextPage()">Next →</button>
        </div>
        <div class="page-footer"><div class="progress-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
    </div>

    <!-- PAGE 3: QUOTE -->
    <div id="quotePage" class="page">
        <div class="page-header"><span class="page-number">💫</span></div>
        <div class="page-content">
            <div class="quote-card"><p class="beautiful-quote">"Like stars that shine brightest in the darkest night, you have your own ways to make things beautiful."</p></div>
            <button class="glow-btn" onclick="nextPage()">Next →</button>
        </div>
        <div class="page-footer"><div class="progress-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
    </div>

    <!-- DYNAMIC CONTENT -->
    <div id="dynamicContent"></div>

</div>

<!-- MUSIC CONTROL -->
<div class="music-control" id="musicControl" onclick="toggleMusic()"><span class="music-icon">🔊</span></div>

<!-- AUDIO ELEMENTS -->
<audio id="bgMusic" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8f7b6c6.mp3?filename=happy-birthday-8bit-108744.mp3" type="audio/mpeg">
</audio>
<audio id="popSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/pop-39248.mp3" type="audio/mpeg">
</audio>
<audio id="giftSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/gift-opening-29572.mp3" type="audio/mpeg">
</audio>
<audio id="successSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
    </html>
